services:
  devcontainer:
    build:
      context: .
      args:
        - USERNAME=${USER:?err}
        - USER_UID=${COMPOSE_USER_ID:-1000}
        - USER_GID=${COMPOSE_GROUP_ID:-1000}
        - DOCKER_GID=${DOCKER_GROUP_ID:?err}
    command: sleep infinity
    environment:
      - DOCKER_COMMAND=/workspaces/docksider/docksider
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - type: bind
        source: ../
        target: /workspaces/docksider
        consistency: consistent
      # Docker-outside-of-Docker
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - type: volume
        source: azure
        target: /home/${USER}/.azure
volumes:
  azure: {}
